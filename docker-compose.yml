version: "3.9"

# SSOLAP — 프로덕션 Docker Compose
#
# 서비스 구성:
#   postgres  — PostgreSQL 16 (메인 DB)
#   redis     — Redis 7 (캐시 / 세션)
#   api       — FastAPI 백엔드 (uvicorn x2 workers)
#   web       — Next.js 프론트엔드 (standalone)
#   nginx     — 리버스 프록시 (80/443)
#
# 시작:
#   cp .env.example .env   # 환경변수 설정
#   docker compose up -d

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ssolap_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-ssolap}
      POSTGRES_USER:     ${POSTGRES_USER:-ssolap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ssolap_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ssolap}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ssolap_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── FastAPI 백엔드 ──────────────────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: ssolap_api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ssolap}:${POSTGRES_PASSWORD:-ssolap_secret}@postgres:5432/${POSTGRES_DB:-ssolap}
      REDIS_URL:    redis://redis:6379
      DEBUG:        "false"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    networks:
      - internal

  # ── Next.js 프론트엔드 ──────────────────────────────────────────────────────
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://api:8000}
        NEXT_PUBLIC_WS_URL:  ${NEXT_PUBLIC_WS_URL:-ws://api:8000}
    container_name: ssolap_web
    restart: unless-stopped
    environment:
      NODE_ENV: production
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    networks:
      - internal

  # ── Nginx 리버스 프록시 ─────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: ssolap_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro          # SSL 인증서 (선택)
      - uploads_data:/var/www/uploads:ro        # 업로드 파일 직접 서빙
    depends_on:
      - web
      - api
    networks:
      - internal
      - external

# ── 볼륨 ────────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  uploads_data:

# ── 네트워크 ─────────────────────────────────────────────────────────────────
networks:
  internal:
    driver: bridge
  external:
    driver: bridge
