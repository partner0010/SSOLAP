version: "3.9"

# SSOLAP — 개발 환경 Docker Compose
# SQLite + 핫리로드 (볼륨 마운트)
#
# 시작: docker compose -f docker-compose.dev.yml up

services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: ssolap_api_dev
    restart: unless-stopped
    environment:
      DATABASE_URL: sqlite+aiosqlite:///./ssolap_dev.db
      DEBUG:        "true"
      SECRET_KEY:   dev_secret_key_do_not_use_in_production
      CORS_ORIGINS: http://localhost:3000
    volumes:
      - ./api:/app         # 핫리로드용 소스 마운트
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  web:
    image: node:20-alpine
    container_name: ssolap_web_dev
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./web:/app
      - /app/node_modules  # node_modules는 마운트 제외
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL:  ws://localhost:8000
    command: sh -c "npm install && npm run dev"
    depends_on:
      - api
